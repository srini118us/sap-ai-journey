_schema-version: '3.1'
ID: btp-intelligent-ops-dashboard
version: 1.0.0
description: "SAP BTP Intelligent Operations & FinOps Copilot"
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npx cds build --production

modules:

  # ── CAP Backend (Node.js on CF) ──────────────────────────────────────
  - name: btp-intelligent-ops-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      readiness-health-check-type: http
      readiness-health-check-http-endpoint: /health
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: btp-intelligent-ops-db
      - name: btp-intelligent-ops-xsuaa
      - name: btp-intelligent-ops-destination   # ADDED for WZ routing

  # ── Fiori / HTML5 App (type changed to html5 for Work Zone) ──────────
  - name: btp-intelligent-ops-app
    type: html5                                  # CHANGED from staticfile
    path: app
    build-parameters:
      build-result: .
      builder: custom
      commands: []
      supported-platforms: []
    requires:
      - name: btp-intelligent-ops-html5-repo    # ADDED for WZ html5 hosting

  # ── HANA Cloud DB Deployer ───────────────────────────────────────────
  - name: btp-intelligent-ops-db-deployer
    type: hdb
    path: gen/db
    build-parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: btp-intelligent-ops-db

resources:

  # ── HANA Cloud HDI Container ─────────────────────────────────────────
  - name: btp-intelligent-ops-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hanatrial                         # CHANGED from hana (required for trial)
      service-plan: hdi-shared

  # ── XSUAA (Authentication) ───────────────────────────────────────────
  - name: btp-intelligent-ops-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: btp-intelligent-ops-${org}-${space}
        tenant-mode: dedicated

  # ── HTML5 App Host (ADDED — required for Work Zone tile) ─────────────
  - name: btp-intelligent-ops-html5-repo
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  # ── Destination Service (ADDED — required for Work Zone routing) ──────
  - name: btp-intelligent-ops-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
